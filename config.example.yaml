# 配置模板：复制为 config.yaml 后填写真实值（config.yaml 含密钥，不要提交/外传）。
# 邮件用于「模式B 批量+定时任务」把打分 PDF 发到邮箱。

email:
  enabled: false                 # 填好 app_password 后改为 true
  smtp_host: smtp.gmail.com
  smtp_port: 465                 # SSL
  sender: your_email@gmail.com   # 你的 Gmail 地址
  # Gmail「应用专用密码」(App Password)，16位，非登录密码。
  # 获取：Google 账号 -> 安全性 -> 两步验证(需先开启) -> 应用专用密码
  app_password: ""
  recipients:
    - your_email@gmail.com       # 收件邮箱（可多个）

# 可选：覆盖打分参数（留空则用 src/features.py 的 PARAMS 默认）
# params:
#   peak_lookback: 120
